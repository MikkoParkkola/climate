        <h2>Features</h2>
        <ul>
          <li>Search any location worldwide by city name or coordinates</li>
          <li>View projected average temperature and temperature change</li>
          <li>Explore annual precipitation forecasts and model-spread ranges</li>

          <li>Compare habitability rankings across global cities</li>
          <li>Download climate projection reports as CSV or PDF</li>
        </ul>
        <h2>How It Works</h2>
        <p>fupit serves projections from a grounded CMIP6/IPCC grid, with NASA/IPCC sea-level data and ETCCDI extreme-climate indices. Select a target year between now and 2100, enter a location, and receive detailed projections with a habitability score from 0 to 100.</p>
