<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="fupit">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#181b22" />
      <stop offset="1" stop-color="#0f1218" />
    </linearGradient>
    <!-- Livability runway: amber (livable) -> ember -> red (danger). Warm family only. -->
    <linearGradient id="runway" x1="6" y1="44" x2="58" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e0a23e" />
      <stop offset="0.55" stop-color="#f2813b" />
      <stop offset="1" stop-color="#de5343" />
    </linearGradient>
    <radialGradient id="sunGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(48 21) scale(15)">
      <stop offset="0" stop-color="#f2813b" stop-opacity="0.75" />
      <stop offset="1" stop-color="#f2813b" stop-opacity="0" />
    </radialGradient>
    <clipPath id="round"><rect width="64" height="64" rx="14" /></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect width="64" height="64" fill="url(#ink)" />
    <!-- soft ember heat bloom at the danger end -->
    <circle cx="48" cy="21" r="15" fill="url(#sunGlow)" />
    <!-- the warming trend / runway, rising left to right -->
    <path d="M6 46 C 20 42, 30 36, 40 28 S 52 19, 58 17" fill="none" stroke="url(#runway)"
      stroke-width="3.4" stroke-linecap="round" />
    <!-- baseline hairline (the comfortable floor) -->
    <path d="M6 50 H 58" stroke="#3a4154" stroke-opacity="0.5" stroke-width="1.2" stroke-linecap="round" />
    <!-- the ember sun / "you are here" marker at the hot end -->
    <circle cx="48" cy="21" r="3.6" fill="#f7a85a" />
    <circle cx="48" cy="21" r="3.6" fill="none" stroke="#ffd9a8" stroke-opacity="0.8" stroke-width="0.8" />
    <!-- brand mark -->
    <text x="11" y="40" font-family="Fraunces, Georgia, serif" font-size="30" font-weight="600" fill="#eef1f6">f</text>
  </g>
</svg>
